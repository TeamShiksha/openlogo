name: Deploy react frontend app

on:
  workflow_dispatch:
  push:
    branches:
      - stage
      - prod
    paths:
      - "packages/ui/**"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    environment: ${{ github.ref_name == 'stage' && 'STAGE' || 'PROD' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.FRONTEND_VERCEL_PROJECT_ID }}

    steps:
      - name: checkout repository
        uses: actions/checkout@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push React image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/ui
          file: ./packages/ui/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/openlogo-frontend
          build-args: |
            API_BASE_URL=http://localhost:5000

      - name: Pull vercel environment information
        run: vercel pull --environment=production --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
