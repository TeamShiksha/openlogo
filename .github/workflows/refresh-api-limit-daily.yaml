name: Refresh API limit Daily

on:
  schedule:
    - cron: "0 0 * * *" # daily at midnight
  workflow_dispatch:

jobs:
  refresh_usage_count:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    strategy:
      matrix:
        branch: [prod]
    environment: ${{ matrix.branch == 'stage' && 'STAGE' || 'PROD' }}

    steps:
      - name: set timezone
        run: |
          sudo timedatectl set-timezone Asia/Kolkata
          sudo timedatectl set-ntp true
          timedatectl

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Install Mongoose
        run: npm install mongoose --legacy-peer-deps

      - name: Run refreshUsageCount script
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
        run: node ./packages/app/scripts/refreshUsageCount.js

