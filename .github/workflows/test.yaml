name: Test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - dev
      - tst
      - prod
      - monorepo_setup
  push: 
    branches: 
      - dev
      - tst
      - prod
      - monorepo_setup

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Dependencies
        run: bun install

      - name: Run ui Test
        run: pnpm run test:ui

      - name: Run ui Coverage
        run: pnpm run coverage:ui
