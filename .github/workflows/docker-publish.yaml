name: Publish Docker Images

on:
  push:
    branches:
      - 646-docker-optimization
    paths:
      - "packages/app/**"
      - "packages/ui/**"
      - "Dockerfile"
      - "docker-compose.yml"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Express image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/app
          file: ./packages/app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/openlogo-express:stage

      - name: Build and push React image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/ui/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/openlogo-react:stage
          build-args: |
            VITE_BASE_URL=http://localhost:5000
