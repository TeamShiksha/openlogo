name: Process Rewards

on:
  schedule:
    - cron: "0 * * * *" # Every hour — adjust cadence as needed
  workflow_dispatch: # Allow manual runs from the GitHub UI

jobs:
  run-reward-worker:
    name: Run Reward Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefix packages/app

      - name: Run reward processing script
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          NODE_ENV: production
        run: node packages/app/scripts/rewards/processRewards.js

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Reward worker failed. Check the logs above for details."
          # Wire up a Slack/email notification here if needed.
