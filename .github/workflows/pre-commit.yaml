name: test

on:
  workflow_dispatch:
  push: 
    branches: 
      - dev

jobs:
  test:
    name: linting, formating and test checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository content
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3 
        with:
            version: 10

      - name: Install run dependencies
        run: pnpm install

      - name: linting
        run: pnpm  lint

      - name: prettier check
        run: pnpm check

      - name: frontend coverage report
        run: pnpm --filter ui coverage
      
      - name: backend coverage report
        run: pnpm --filter ui app