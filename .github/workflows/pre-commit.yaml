name: Check linting, format, test and linked issue

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened]
    branches:
      - stage
      - prod

jobs:
  standards:
    name: Check linting/formatin and test cases
    runs-on: ubuntu-20.04
    timeout-minutes: 5
    permissions:
      issues: read
      pull-requests: write
    steps:
      - name: Checkout repository content
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3 
        with:
            version: 10

      - name: Install run dependencies
        run: pnpm install
      
      - name: Check for folder changes
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            ui:
              - 'packages/ui/**'
            app:
              - 'packages/app/**'

      - name: linting
        if: steps.filter.outputs.ui == 'true' || steps.filter.outputs.app == 'true'
        run: pnpm lint

      - name: prettier check
        if: steps.filter.outputs.ui == 'true' || steps.filter.outputs.app == 'true'
        run: pnpm check

      - name: frontend coverage report
        if: steps.filter.outputs.ui == 'true'
        run: pnpm --filter ui coverage
      
      - name: backend coverage report
        if: steps.filter.outputs.app == 'true'
        run: pnpm --filter app coverage

      - name: Check linked issues
        id: linked-issues
        uses: nearform-actions/github-action-check-linked-issues@v1
        with:
          exclude-branches: "release/**, dependabot/**"
      
      - name: Transfer Labels from Linked Issues
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.issue.number;
            const linkedIssuesJson = '${{ steps.linked-issues.outputs.issues }}';
            const linkedIssuesRaw = JSON.parse(linkedIssuesJson);
            const linkedIssues = linkedIssuesRaw.map(issueRef => {
                const parts = issueRef.split('#');
                return parseInt(parts[parts.length - 1]);
              }).filter(num => !isNaN(num));
            const allLabels = new Set();
            for (const issueNumber of linkedIssues) {
              const linkedIssue = await github.rest.issues.get({
                owner,
                repo,
                issue_number: issueNumber
              });
              linkedIssue.data.labels.forEach(label => {
                allLabels.add(label.name);
              });
            }
            if (allLabels.size === 0) {
              return;
            }
            const labelsArray = Array.from(allLabels);
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr_number,
              labels: labelsArray
            });

      - name: Assign PR to Author
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const assignee = context.payload.pull_request.user.login;
            await github.rest.orgs.checkMembershipForUser({
                org: owner,
                username: assignee
              });
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number,
              assignees: [assignee]
            });